---
# System setup (as deploy user, via CI)
# Usage: ansible-playbook setup.yml --limit HOST --user deploy
- name: System setup
  hosts: all
  become: true
  tasks:
    - name: Base system
      ansible.builtin.import_tasks: tasks/base.yml
      tags: [base]

    - name: SSH hardening
      ansible.builtin.import_tasks: tasks/ssh.yml
      tags: [ssh]

    - name: Firewall
      ansible.builtin.import_tasks: tasks/firewall.yml
      tags: [firewall]

    - name: Host tuning
      ansible.builtin.import_tasks: tasks/host_tuning.yml
      tags: [tuning]

    - name: Postgres cluster backup
      ansible.builtin.import_tasks: tasks/postgres_cluster.yml
      tags: [postgres]

    - name: Inventory feedback
      ansible.builtin.import_tasks: tasks/inventory_feedback.yml
      tags: [feedback]

  handlers:
    - name: Include shared handlers
      ansible.builtin.import_tasks: handlers/main.yml
