---
# System setup (as deploy user, via CI)
# Usage: ansible-playbook setup.yml --limit HOST --user deploy
- name: System setup
  hosts: all
  become: true
  tasks:
    - name: Base system
      ansible.builtin.import_tasks: tasks/base.yml
      tags: [base]

    - name: SSH hardening
      ansible.builtin.import_tasks: tasks/ssh.yml
      tags: [ssh]

    - name: Firewall
      ansible.builtin.import_tasks: tasks/firewall.yml
      tags: [firewall]

    - name: Host tuning
      ansible.builtin.import_tasks: tasks/host_tuning.yml
      tags: [tuning]

    - name: Check for a postgres installation
      ansible.builtin.stat:
        path: /etc/postgresql
      register: postgres_etc
      tags: [postgres]

    - name: Postgres cluster backup
      ansible.builtin.import_tasks: tasks/postgres_cluster.yml
      tags: [postgres]
      # only for hosts that actually run postgres (the tasks chown to the
      # postgres user), with the backup config loaded — postgres_backup_*
      # live in group_vars/servers alongside the vault, so a host run with
      # an ad-hoc inventory (e.g. first bootstrap) skips this stage too
      when: postgres_backup_dir is defined and postgres_etc.stat.exists

    - name: Observability
      ansible.builtin.import_tasks: tasks/observability.yml
      tags: [observability]

    - name: Inventory feedback
      ansible.builtin.import_tasks: tasks/inventory_feedback.yml
      tags: [feedback]

  handlers:
    - name: Include shared handlers
      ansible.builtin.import_tasks: handlers/main.yml
