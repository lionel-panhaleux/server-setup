---
# System setup (as deploy user, via CI)
# Usage: ansible-playbook setup.yml --limit HOST --user deploy
- name: System setup
  hosts: all
  tasks:
    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: full
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - unattended-upgrades
          - logrotate
          - ufw
          - nginx
          - certbot
          - python3-certbot-nginx
          - python3-venv
          - python3-dev
          - python3-pip
          - postgresql
          - postgresql-client
          - libpq-dev
          - python3-psycopg2
          - gcc
          - make
          - curl
          - rsync
          - git
          - acl
        state: present

    - name: Enable automatic security updates
      ansible.builtin.copy:
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        mode: "0644"

    - name: Install uv
      ansible.builtin.unarchive:
        src: "https://github.com/astral-sh/uv/releases/latest/download/uv-{{ ansible_facts['architecture'] }}-unknown-linux-gnu.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        extra_opts:
          - --strip-components=1
        creates: /usr/local/bin/uv

    - name: Deploy hardened sshd config
      ansible.builtin.template:
        src: templates/sshd_config.j2
        dest: /etc/ssh/sshd_config
        mode: "0644"
        validate: "sshd -t -f %s"
      notify: Restart sshd

    - name: Allow SSH through UFW
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow HTTP through UFW
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS through UFW
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Enable UFW with deny-by-default policy
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Ensure nginx is enabled and running
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: Ensure certbot timer is enabled
      ansible.builtin.systemd:
        name: certbot.timer
        state: started
        enabled: true

    - name: Ensure logrotate timer is enabled
      ansible.builtin.systemd:
        name: logrotate.timer
        state: started
        enabled: true

    - name: Ensure tmp files cleanup timer is enabled
      ansible.builtin.systemd:
        name: systemd-tmpfiles-clean.timer
        state: started
        enabled: true

    - name: Read SSH host ed25519 public key
      ansible.builtin.slurp:
        src: /etc/ssh/ssh_host_ed25519_key.pub
      register: ssh_host_pubkey

    - name: Write host key to inventory
      ansible.builtin.copy:
        content: |
          host_key: "{{ ansible_host }} {{ ssh_host_pubkey.content | b64decode | trim }}"
        dest: "{{ playbook_dir }}/inventory/host_vars/{{ inventory_hostname }}.yml"
        mode: "0644"
      delegate_to: localhost
      become: false

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Warn if reboot is required
      ansible.builtin.debug:
        msg: "REBOOT REQUIRED: A kernel or system update needs a reboot to take effect."
      when: reboot_required.stat.exists
      changed_when: true

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted

    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
