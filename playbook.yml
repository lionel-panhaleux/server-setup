---
# Play 1: Bootstrap (run once, as root)
# Usage: ansible-playbook playbook.yml -i "HOST," --user root --tags bootstrap \
#        -e "ssh_public_key='ssh-ed25519 AAAA...'"
- name: Bootstrap server
  hosts: all
  tags: [bootstrap]
  gather_facts: false
  tasks:
    - name: Create deploy user
      ansible.builtin.user:
        name: lpanhaleux
        shell: /bin/bash
        groups: sudo
        append: true
        create_home: true

    - name: Grant passwordless sudo
      ansible.builtin.copy:
        content: "lpanhaleux ALL=(ALL) NOPASSWD:ALL\n"
        dest: /etc/sudoers.d/lpanhaleux
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Add SSH authorized key
      ansible.posix.authorized_key:
        user: lpanhaleux
        key: "{{ ssh_public_key }}"
        state: present

    - name: Deploy hardened sshd config
      ansible.builtin.template:
        src: templates/sshd_config.j2
        dest: /etc/ssh/sshd_config
        mode: "0644"
        validate: "sshd -t -f %s"
      notify: Restart sshd

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted

# Play 2: System setup (as lpanhaleux)
# Usage: ansible-playbook playbook.yml -i "HOST," --tags setup
- name: System setup
  hosts: all
  tags: [setup]
  tasks:
    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: full
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
          - python3-venv
          - python3-dev
          - python3-pip
          - postgresql
          - postgresql-client
          - libpq-dev
          - python3-psycopg2
          - gcc
          - make
          - curl
          - rsync
          - git
          - acl
        state: present

    - name: Check if uv is installed
      ansible.builtin.stat:
        path: /usr/local/bin/uv
      register: uv_binary

    - name: Install uv
      ansible.builtin.shell:
        cmd: curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh
      when: not uv_binary.stat.exists
      changed_when: true

    - name: Configure UFW defaults
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Allow SSH through UFW
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow HTTP through UFW
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS through UFW
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Ensure nginx is enabled and running
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: Ensure certbot timer is enabled
      ansible.builtin.systemd:
        name: certbot.timer
        state: started
        enabled: true

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
