---
# Restore {{ postgres_db_name }} from a restic snapshot in the host's configured
# remote repository. Requires /etc/postgres-backup/remote.env on the target host
# (installed by server-setup's setup.yml when remote_backup_enabled=true).
#
# Fetches the snapshot to a tmp staging dir, sets postgres_db_backup_file to the
# materialized dump, delegates to restore.yml for the destructive drop/recreate,
# and removes the staging dir regardless of outcome.
#
# Runs as the postgres OS user, scoped to this block so become never leaks into
# the consumer's play. See tasks/main.yml for why.
- name: Remote restore from restic snapshot
  become: true
  become_user: postgres
  block:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - postgres_db_name | length > 0
          - postgres_db_user | length > 0
        fail_msg: "postgres_db_name and postgres_db_user are required for remote restore"

    - name: Check host has remote backup creds
      ansible.builtin.stat:
        path: /etc/postgres-backup/remote.env
      register: postgres_db_remote_env

    - name: Assert remote.env exists
      ansible.builtin.assert:
        that: postgres_db_remote_env.stat.exists
        fail_msg: >-
          /etc/postgres-backup/remote.env not found — run server-setup's setup.yml
          on this host with remote_backup_enabled=true first

    - name: Remote restore
      vars:
        _staging_dir: "/tmp/pg-restore-{{ postgres_db_name }}"
        _snapshot: "{{ postgres_db_restore_snapshot | default('latest') }}"
      block:
        - name: Create restore staging dir
          ansible.builtin.file:
            path: "{{ _staging_dir }}"
            state: directory
            owner: postgres
            group: postgres
            mode: "0700"

        - name: Fetch snapshot from restic
          ansible.builtin.shell: |
            set -eu
            . /etc/postgres-backup/remote.env
            export RESTIC_REPOSITORY="${RESTIC_REPOSITORY_BASE}/{{ postgres_db_name }}"
            /usr/bin/restic restore "{{ _snapshot }}" --target "{{ _staging_dir }}"
          changed_when: true

        - name: Locate restored dump
          ansible.builtin.find:
            paths: "{{ _staging_dir }}"
            patterns: "*.dump"
            recurse: true
          register: postgres_db_restored_dumps

        - name: Assert exactly one dump restored
          ansible.builtin.assert:
            that: postgres_db_restored_dumps.files | length == 1
            fail_msg: "expected exactly one .dump in the snapshot, found {{ postgres_db_restored_dumps.files | length }}"

        - name: Point restore.yml at the fetched dump
          ansible.builtin.set_fact:
            postgres_db_backup_file: "{{ postgres_db_restored_dumps.files[0].path }}"

        - name: Run destructive local restore
          ansible.builtin.include_tasks: restore.yml
      always:
        - name: Remove restore staging dir
          ansible.builtin.file:
            path: "{{ _staging_dir }}"
            state: absent
