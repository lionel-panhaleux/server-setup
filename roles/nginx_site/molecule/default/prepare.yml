---
- name: Prepare nginx test host
  hosts: all
  gather_facts: true
  vars:
    _test_domains:
      - domain: static.molecule.test
      - domain: spa.molecule.test
      - domain: proxy.molecule.test
      - domain: api.molecule.test
        extra_sans: [alias.molecule.test]
  tasks:
    - name: Refresh apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install nginx + openssl
      ansible.builtin.apt:
        name:
          - nginx
          - openssl
        state: present

    - name: Create LE directory per test domain
      ansible.builtin.file:
        path: "/etc/letsencrypt/live/{{ item.domain }}"
        state: directory
        mode: "0755"
      loop: "{{ _test_domains }}"
      loop_control:
        label: "{{ item.domain }}"

    # Pre-populating the cert at the expected path (with SANs covering the
    # site's domains) makes the role's certbot task a no-op via its coverage
    # check, so no live LE call is attempted (certbot isn't even installed:
    # an uncovered domain fails converge loudly).
    - name: Generate self-signed cert per test domain
      ansible.builtin.command:
        cmd: >-
          openssl req -x509 -nodes -newkey rsa:2048 -days 3650
          -keyout /etc/letsencrypt/live/{{ item.domain }}/privkey.pem
          -out /etc/letsencrypt/live/{{ item.domain }}/fullchain.pem
          -subj "/CN={{ item.domain }}"
          -addext "subjectAltName=DNS:{{ item.domain }}{%
            for san in item.extra_sans | default([]) %},DNS:{{ san }}{% endfor %}"
        creates: "/etc/letsencrypt/live/{{ item.domain }}/fullchain.pem"
      loop: "{{ _test_domains }}"
      loop_control:
        label: "{{ item.domain }}"

    # No options-ssl-nginx.conf / ssl-dhparams.pem stubs here: the HTTPS vhost
    # inlines its SSL settings (certbot certonly --webroot never installs those
    # files), so the test runs under the same condition as real deploys.

    # Normally installed by server-setup's tasks/base.yml; the role assumes it exists.
    - name: Install websocket upgrade map (required by proxy-type sites)
      ansible.builtin.copy:
        dest: /etc/nginx/conf.d/upgrade_map.conf
        content: |
          map $http_upgrade $connection_upgrade {
              default upgrade;
              ''      close;
          }
        mode: "0644"

    - name: Start nginx
      ansible.builtin.service:
        name: nginx
        state: started
