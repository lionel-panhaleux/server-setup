---
- name: Validate inputs
  ansible.builtin.assert:
    that:
      - nginx_site_name | length > 0
      - nginx_site_domain | length > 0
      - nginx_site_type in ["static", "spa", "proxy"]
      - (nginx_site_type != "proxy") or (nginx_site_upstream | length > 0)
      - (nginx_site_type == "proxy") or (nginx_site_root | length > 0)
    fail_msg: "nginx_site_name, nginx_site_domain, nginx_site_type and its companion (nginx_site_root or nginx_site_upstream) are required"

# nginx_site_name becomes a syslog tag (templates/site.conf.j2) — nginx rejects
# anything other than alphanumeric + underscore with a cryptic parse error.
- name: Validate nginx_site_name charset
  ansible.builtin.assert:
    that: nginx_site_name is match('^[A-Za-z0-9_]+$')
    fail_msg: >-
      nginx_site_name must contain only alphanumeric and underscore
      (it becomes an nginx syslog tag). Got: "{{ nginx_site_name }}"

# nginx < 1.25.1 (e.g. Debian 12's 1.22) predates the `http2 on;` directive
# and needs the legacy `listen ... http2` parameter (itself deprecated in
# newer nginx): detect the version once, the template picks the right syntax.
- name: Detect nginx version
  ansible.builtin.command:
    cmd: nginx -v
  register: nginx_site_version
  changed_when: false

- name: Compute http2 directive style
  ansible.builtin.set_fact:
    nginx_site_modern_http2: >-
      {{ ((nginx_site_version.stderr ~ nginx_site_version.stdout)
          | regex_search('nginx/(\d+\.\d+(?:\.\d+)?)', '\1')
          | first) is version('1.25.1', '>=') }}

- name: Ensure certbot webroot
  ansible.builtin.file:
    path: /var/www/certbot
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Check for existing TLS certificate
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ nginx_site_domain }}/fullchain.pem"
  register: nginx_site_cert

- name: Render site config (HTTP-only until cert exists)
  ansible.builtin.template:
    src: site.conf.j2
    dest: "/etc/nginx/sites-available/{{ nginx_site_name }}.conf"
    mode: "0644"
  vars:
    cert_exists: "{{ nginx_site_cert.stat.exists }}"
  notify: Reload nginx

- name: Enable site
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ nginx_site_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ nginx_site_name }}.conf"
    state: link
  notify: Reload nginx

- name: Reload nginx before requesting certificate
  ansible.builtin.meta: flush_handlers

# A cert can exist but predate an alias change (e.g. an apex domain moved to
# this site as an alias): compare its SANs to the desired domain set and
# re-issue with --expand when any name is missing.
- name: Read certificate domain coverage
  ansible.builtin.command:
    cmd: >-
      openssl x509 -noout -ext subjectAltName
      -in /etc/letsencrypt/live/{{ nginx_site_domain }}/fullchain.pem
  register: nginx_site_cert_sans
  changed_when: false
  when: nginx_site_cert.stat.exists

- name: Request Let's Encrypt certificate (issue, or expand for new aliases)
  ansible.builtin.command:
    cmd: >-
      certbot certonly --webroot -w /var/www/certbot
      --cert-name {{ nginx_site_domain }}
      -d {{ nginx_site_domain }}
      {% for a in nginx_site_aliases + nginx_site_cert_extra_domains %}-d {{ a }} {% endfor %}
      --expand --non-interactive --agree-tos --register-unsafely-without-email
  vars:
    nginx_site_cert_covered: >-
      {{ (nginx_site_cert_sans.stdout | default(''))
         | regex_findall('DNS:([^,\s]+)') }}
  when: >-
    not nginx_site_cert.stat.exists or
    (([nginx_site_domain] + nginx_site_aliases + nginx_site_cert_extra_domains)
     | difference(nginx_site_cert_covered) | length > 0)
  notify: Reload nginx

- name: Re-check certificate
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ nginx_site_domain }}/fullchain.pem"
  register: nginx_site_cert

- name: Render final site config with HTTPS
  ansible.builtin.template:
    src: site.conf.j2
    dest: "/etc/nginx/sites-available/{{ nginx_site_name }}.conf"
    mode: "0644"
  vars:
    cert_exists: "{{ nginx_site_cert.stat.exists }}"
  notify: Reload nginx
