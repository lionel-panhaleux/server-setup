ansible_user: deploy
ansible_ssh_private_key_file: ~/.ssh/deploy

# Observability — Grafana Alloy ships node + postgres metrics and journald
# logs to Grafana Cloud. URLs are non-secret (account-specific); credentials
# and postgres DSN password live in the sibling vault.yml. Flip
# observability_enabled to true once vault vars are populated (see README).
observability_enabled: true
grafana_cloud_prom_url: "https://prometheus-prod-65-prod-eu-west-2.grafana.net/api/prom/push"
grafana_cloud_loki_url: "https://logs-prod-012.grafana.net/loki/api/v1/push"

# Cluster-wide postgres backup (one systemd timer iterates every non-template
# DB). setup.yml installs /usr/local/bin/pg-backup and postgres-backup.timer.
postgres_backup_dir: /var/backups/postgres
postgres_backup_retention_days: 7
postgres_backup_schedule: "daily"   # systemd OnCalendar= expression

# Remote upload via restic (one repo per DB at s3:<endpoint>/<bucket>/<db>).
# When remote_backup_enabled, setup.yml writes /etc/postgres-backup/remote.env
# from the vault_remote_backup_* secrets in the sibling vault.yml and renders
# the bucket/endpoint into the service unit.
remote_backup_enabled: true
postgres_remote_backup_bucket: "krcg-db-backups"
postgres_remote_backup_endpoint: "https://s3.fr-par.scw.cloud"
postgres_remote_backup_keep_daily: 7
postgres_remote_backup_keep_weekly: 4
postgres_remote_backup_keep_monthly: 12

# Optional dead-man's-switch pings (healthchecks.io-style): the backup and
# check scripts GET the URL on success and <url>/fail on failure, so a timer
# that silently stops firing alerts by ABSENCE of pings — the failure mode
# Alloy/Grafana log alerting can't see. Set vault_postgres_backup_healthcheck_url
# and vault_postgres_backup_check_healthcheck_url in the sibling vault.yml
# (ping UUIDs are capability URLs); unset = no pings.
