---
# Cluster-wide postgres backup setup: per-database logging, daily backups
# (optional restic upload), weekly integrity check.

- name: Locate postgres conf.d directories
  ansible.builtin.find:
    paths: /etc/postgresql
    patterns: conf.d
    recurse: true
    file_type: directory
  register: pg_confd_dirs

- name: Configure postgres log_line_prefix to include database name
  ansible.builtin.copy:
    dest: "{{ item.path }}/50-log-prefix.conf"
    content: |
      # Managed by server-setup.
      # %d puts the database name in every session log line so
      # `journalctl -u postgresql -g "@<db>"` scopes engine logs to that DB.
      log_line_prefix = '[%p] %q@%d '
    mode: "0644"
  loop: "{{ pg_confd_dirs.files }}"
  loop_control:
    label: "{{ item.path }}"
  notify: Restart postgresql

- name: Configure postgres query + contention logging
  ansible.builtin.copy:
    dest: "{{ item.path }}/51-log-queries.conf"
    content: |
      # Managed by server-setup. Targeted visibility, not log_statement=all.
      # Slow queries (>1s).
      log_min_duration_statement = 1000
      # Lock contention (waits > deadlock_timeout, default 1s).
      log_lock_waits = on
      # Autovacuum runs >1s — DB health signal.
      log_autovacuum_min_duration = 1000
      # Checkpoint cadence — storage IO pressure signal.
      log_checkpoints = on
      # DDL statements for a free audit trail.
      log_statement = 'ddl'
      # Temp files >10MB — bad plans / insufficient work_mem.
      log_temp_files = 10240
    mode: "0644"
  loop: "{{ pg_confd_dirs.files }}"
  loop_control:
    label: "{{ item.path }}"
  notify: Restart postgresql

- name: Assert remote backup secrets are present
  ansible.builtin.assert:
    that:
      - vault_remote_backup_access_key | default('') | length > 0
      - vault_remote_backup_secret_key | default('') | length > 0
      - vault_remote_backup_restic_password | default('') | length > 0
      - postgres_remote_backup_bucket | length > 0
    fail_msg: >-
      remote_backup_enabled=true requires vault_remote_backup_access_key,
      vault_remote_backup_secret_key, vault_remote_backup_restic_password
      (vault-encrypted), and postgres_remote_backup_bucket in inventory
  when: remote_backup_enabled | default(false)

- name: Ensure backup config dir exists
  ansible.builtin.file:
    path: /etc/postgres-backup
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Write healthcheck ping URLs
  # Capability URLs (healthchecks.io-style ping UUIDs) — vault-held; the
  # scripts no-op without the file (units load it with `EnvironmentFile=-`).
  # A dead-man's switch complements Alloy/Grafana alerting: absence of the
  # success ping catches "the timer never fired", which logs can't.
  ansible.builtin.copy:
    content: |
      BACKUP_HEALTHCHECK_URL={{ vault_postgres_backup_healthcheck_url | default('') }}
      CHECK_HEALTHCHECK_URL={{ vault_postgres_backup_check_healthcheck_url | default('') }}
    dest: /etc/postgres-backup/healthcheck.env
    owner: root
    group: postgres
    mode: "0640"
  when: >-
    (vault_postgres_backup_healthcheck_url | default('') | length > 0)
    or (vault_postgres_backup_check_healthcheck_url | default('') | length > 0)
  no_log: true

- name: Write remote backup credentials
  ansible.builtin.copy:
    content: |
      AWS_ACCESS_KEY_ID={{ vault_remote_backup_access_key }}
      AWS_SECRET_ACCESS_KEY={{ vault_remote_backup_secret_key }}
      RESTIC_PASSWORD={{ vault_remote_backup_restic_password }}
      RESTIC_REPOSITORY_BASE=s3:{{ postgres_remote_backup_endpoint }}/{{ postgres_remote_backup_bucket }}
      REMOTE_KEEP_DAILY={{ postgres_remote_backup_keep_daily }}
      REMOTE_KEEP_WEEKLY={{ postgres_remote_backup_keep_weekly }}
      REMOTE_KEEP_MONTHLY={{ postgres_remote_backup_keep_monthly }}
    dest: /etc/postgres-backup/remote.env
    owner: root
    group: postgres
    mode: "0640"
  when: remote_backup_enabled | default(false)
  no_log: true

- name: Ensure postgres backup dir
  ansible.builtin.file:
    path: "{{ postgres_backup_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"

- name: Install pg-backup script
  ansible.builtin.copy:
    src: files/pg-backup.sh
    dest: /usr/local/bin/pg-backup
    owner: root
    group: postgres
    mode: "0750"

- name: Install pg-backup service unit
  ansible.builtin.template:
    src: templates/pg-backup.service.j2
    dest: /etc/systemd/system/postgres-backup.service
    mode: "0644"
  notify: Reload systemd

- name: Install pg-backup timer unit
  ansible.builtin.template:
    src: templates/pg-backup.timer.j2
    dest: /etc/systemd/system/postgres-backup.timer
    mode: "0644"
  notify: Reload systemd

- name: Install pg-backup-check script
  ansible.builtin.copy:
    src: files/pg-backup-check.sh
    dest: /usr/local/bin/pg-backup-check
    owner: root
    group: postgres
    mode: "0750"

- name: Install pg-backup-check service unit
  ansible.builtin.template:
    src: templates/pg-backup-check.service.j2
    dest: /etc/systemd/system/postgres-backup-check.service
    mode: "0644"
  notify: Reload systemd

- name: Install pg-backup-check timer unit
  ansible.builtin.template:
    src: templates/pg-backup-check.timer.j2
    dest: /etc/systemd/system/postgres-backup-check.timer
    mode: "0644"
  notify: Reload systemd

- name: Reload systemd before enabling backup timers
  ansible.builtin.meta: flush_handlers

- name: Enable and start pg-backup timer
  ansible.builtin.systemd:
    name: postgres-backup.timer
    enabled: true
    state: started

- name: Enable and start pg-backup-check timer
  ansible.builtin.systemd:
    name: postgres-backup-check.timer
    enabled: true
    state: started
