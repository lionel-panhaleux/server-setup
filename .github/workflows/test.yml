name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ansible + linters
        run: pip install ansible ansible-lint yamllint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: ansible-lint

      - name: Run yamllint
        run: yamllint .

  molecule:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        role:
          - nginx_site
          - postgres_db
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Ansible + molecule + docker driver
        run: pip install ansible molecule 'molecule-plugins[docker]'

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy collection install community.docker

      - name: Molecule test
        run: molecule test
        working-directory: roles/${{ matrix.role }}
        env:
          # molecule-plugins (<= 25.8.12, still unfixed on their main) docker
          # create.yml reads item.invocation.module_args.dest, but ansible-core
          # >= 2.21 omits `invocation` from task results by default. Re-enable
          # injection until molecule-plugins ships a fix.
          ANSIBLE_INJECT_INVOCATION: "true"
