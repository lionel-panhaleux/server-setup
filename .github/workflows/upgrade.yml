name: Distribution Upgrade

on:
  workflow_dispatch:
    inputs:
      host:
        description: Inventory hostname to target
        required: true
        type: choice
        options:
          - gravelines
          - strasbourg
          - frankfurt
      confirm:
        description: Execute the upgrade (unchecked = check only)
        type: boolean
        default: false

jobs:
  upgrade:
    name: Run distribution upgrade
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ansible
        run: pip install ansible

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          yq '.host_key' inventory/host_vars/${{ inputs.host }}.yml >> ~/.ssh/known_hosts

      - name: Run upgrade playbook
        run: |
          ansible-playbook upgrade.yml --limit "${{ inputs.host }}" -e confirm=${{ inputs.confirm }}
