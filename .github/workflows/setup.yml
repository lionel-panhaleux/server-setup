name: Server Setup

on:
  workflow_dispatch:
    inputs:
      host:
        description: Inventory hostname to target
        required: true
        type: choice
        options:
          - gravelines
          - strasbourg
          - frankfurt

concurrency:
  group: ${{ inputs.host }}
  cancel-in-progress: false

jobs:
  setup:
    name: Run system setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ansible
        run: pip install ansible

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          yq '.host_key' inventory/host_vars/${{ inputs.host }}.yml >> ~/.ssh/known_hosts

      - name: Write vault password
        run: |
          printf '%s' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault-pass
          chmod 600 /tmp/vault-pass

      - name: Run setup playbook
        run: |
          ansible-playbook setup.yml --limit "${{ inputs.host }}" --vault-password-file /tmp/vault-pass
